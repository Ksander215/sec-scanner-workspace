version: '3.8'

services:
  si-server:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SI_SERVER_PORT=8080
      - SI_PERSISTENCE_BACKEND=json
      - SI_DATA_DIR=/app/data
      - SI_LOG_LEVEL=info
      - SI_AUTH_ENABLED=false
    volumes:
      - si-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  si-server-postgres:
    build: .
    ports:
      - "8081:8080"
    environment:
      - SI_SERVER_PORT=8080
      - SI_PERSISTENCE_BACKEND=postgres
      - SI_DB_HOST=postgres
      - SI_DB_PORT=5432
      - SI_DB_USER=siplatform
      - SI_DB_PASSWORD=${POSTGRES_PASSWORD:-siplatform123}
      - SI_DB_NAME=siplatform
      - SI_AUTH_ENABLED=true
      - SI_AUTH_PROVIDER=jwt
      - SI_JWT_SECRET=${JWT_SECRET:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: siplatform
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-siplatform123}
      POSTGRES_DB: siplatform
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siplatform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1.54
    ports:
      - "16686:16686"
      - "14268:14268"
    environment:
      COLLECTOR_OTLP_ENABLED: true

volumes:
  si-data:
  pg-data:
  redis-data:
