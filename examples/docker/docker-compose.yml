# Security Intelligence Platform — Docker Compose
#
# Starts the platform with PostgreSQL for persistence and Redis for
# caching/event-bus backing. Suitable for local development and testing.
#
# Usage:
#   docker compose up -d
#   docker compose logs -f si-platform
#   docker compose down -v
#
# Endpoints:
#   API:     http://localhost:8080
#   Health:  http://localhost:8080/health
#   Metrics: http://localhost:8080/metrics
#   pgAdmin: http://localhost:5050  (admin@si.local / admin)

version: "3.9"

services:
  # ── Security Intelligence Platform ────────────────────────────────────────
  si-platform:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: si-platform
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      SI_PORT: "8080"
      SI_HOST: "0.0.0.0"
      # PostgreSQL persistence
      SI_PERSISTENCE_TYPE: postgresql
      SI_PG_HOST: postgres
      SI_PG_PORT: 5432
      SI_PG_DATABASE: si_platform
      SI_PG_USER: si_user
      SI_PG_PASSWORD: ${SI_PG_PASSWORD:-si_changeme}
      SI_PG_POOL_SIZE: "20"
      # Redis caching
      SI_REDIS_URL: redis://redis:6379/0
      SI_REDIS_TTL_MS: "3600000"
      # Auth
      SI_AUTH_JWT_SECRET: ${SI_JWT_SECRET:-change-me-in-production}
      SI_AUTH_API_KEY: ${SI_API_KEY:-si-api-key-dev}
      # Logging
      SI_LOG_LEVEL: info
      SI_LOG_FORMAT: json
      # Analysis defaults
      SI_MAX_ATTACK_PATH_DEPTH: "8"
      SI_RISK_SEVERITY_WEIGHT: "0.35"
      SI_RISK_EXPLOITABILITY_WEIGHT: "0.25"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - si-network

  # ── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: si-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: si_platform
      POSTGRES_USER: si_user
      POSTGRES_PASSWORD: ${SI_PG_PASSWORD:-si_changeme}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U si_user -d si_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - si-network

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: si-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - si-network

  # ── pgAdmin (optional — for debugging) ──────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: si-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@si.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    profiles:
      - debug
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - si-network

# ── Volumes ────────────────────────────────────────────────────────────────
volumes:
  pg-data:
    driver: local
  redis-data:
    driver: local

# ── Networks ───────────────────────────────────────────────────────────────
networks:
  si-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
