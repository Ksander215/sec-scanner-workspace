apiVersion: v1
kind: Service
metadata:
  name: {{ include "si-platform.fullname" . }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.config.server.port }}
      protocol: TCP
  selector:
    app: {{ include "si-platform.name" . }}
