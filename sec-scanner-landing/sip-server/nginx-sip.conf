# SIP — nginx configuration for sec-scanner.pro
# Static frontend + API proxy to backend server

server {
    listen 80;
    server_name sec-scanner.pro www.sec-scanner.pro;
    return 301 https://sec-scanner.pro$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sec-scanner.pro www.sec-scanner.pro;

    ssl_certificate /etc/letsencrypt/live/sec-scanner.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sec-scanner.pro/privkey.pem;

    # ─── Frontend (static export) ─────────────────────────────────────────
    root /var/www/sec-scanner.pro;
    index index.html;

    # ─── API proxy → Backend server ──────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # SSE support — disable buffering
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # ─── Static files ────────────────────────────────────────────────────
    location /_next/static/ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # ─── SPA fallback ────────────────────────────────────────────────────
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
