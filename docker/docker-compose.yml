version: '3.8'

services:
  frontend:
    build:
      context: ../landing
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "3001:3001"
    volumes:
      - sip-data:/var/lib/sip
    environment:
      - PORT=3001
      - NODE_ENV=production
    restart: unless-stopped

  worker:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.worker
    volumes:
      - sip-data:/var/lib/sip
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../backend/nginx-sip.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend-build:/var/www/sec-scanner.pro:ro
      - certbot-data:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  sip-data:
  frontend-build:
  certbot-data:
